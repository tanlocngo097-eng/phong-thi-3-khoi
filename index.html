<!DOCTYPE html>
<html lang="vi">
<head>
<meta charset="UTF-8">
<title>Hệ thống tra cứu học sinh</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
<style>
:root{--primary:#0b5ed7;--primary-dark:#084298;--card:#fff;--muted:#64748b}
*{box-sizing:border-box}
body{margin:0;font-family:Inter,sans-serif;background:linear-gradient(135deg,#e0f2fe,#f8fafc);min-height:100vh;display:flex;align-items:center;justify-content:center}
.app{max-width:560px;width:100%;background:var(--card);border-radius:22px;box-shadow:0 25px 50px rgba(0,0,0,.15);padding:28px}
.header{display:flex;gap:14px;margin-bottom:20px;align-items:center}
.logo{width:56px;height:56px;border-radius:14px;background:#e0e7ff;display:flex;align-items:center;justify-content:center}
.logo img{width:44px;height:44px;object-fit:contain}
.title h1{margin:0;font-size:20px}
.title p{margin:2px 0 0;color:var(--muted);font-size:13px}
.search-box{display:flex;gap:10px}
.search-box input{flex:1;padding:14px;border-radius:12px;border:1px solid #c7d2fe}
.search-box button{padding:14px 22px;border-radius:12px;border:none;background:var(--primary);color:#fff}
.hint{font-size:13px;color:var(--muted);margin:10px 0}
.card{border:1px solid #e5e7eb;border-radius:18px;padding:18px}
.badge{display:inline-block;padding:6px 14px;border-radius:999px;background:#dbeafe;color:#084298;font-size:12px;margin-bottom:10px}
.grid{display:grid;grid-template-columns:1fr 1fr;gap:10px 14px}
.item{font-size:14px}
.item span{color:var(--muted)}
.not-found{text-align:center;color:#dc2626;padding:10px}
.footer{text-align:center;font-size:12px;color:var(--muted);margin-top:20px}
</style>
</head>
<body>
<div class="app">
  <div class="header">
    <div class="logo"><img src="./logo.png"></div>
    <div class="title"><h1>HỆ THỐNG TRA CỨU HỌC SINH</h1><p>Dữ liệu nội bộ</p></div>
  </div>
  <div class="search-box">
    <input id="sbdInput" placeholder="Nhập số báo danh">
    <button onclick="search()">Tra cứu</button>
  </div>
  <div class="hint">Gợi ý: nhập đúng số báo danh</div>
  <div id="result"></div>
  <div class="footer">© ngoloc&phula</div>
</div>
<script>
let data=[];
fetch("./data.json")
.then(r=>{if(!r.ok)throw 0;return r.json()})
.then(j=>data=j)
.catch(()=>alert("Không đọc được file data.json"));
function item(l,v){if(v==="không thi")return"";if(v==="X")v="✔ Có thi";return `<div class="item"><span>${l}:</span> ${v}</div>`}
function search(){
 const s=document.getElementById("sbdInput").value.trim();
 const r=document.getElementById("result");r.innerHTML="";
 const h=data.find(x=>String(x.sbd).trim()===s);
 if(!h){r.innerHTML='<div class="not-found">Không tìm thấy học sinh</div>';return;}
 r.innerHTML=`<div class="card"><div class="badge">SBD ${h.sbd}</div><h2>${h.hoTen}</h2><div class="grid">
 ${item("Lớp",h.lop)}${item("Toán",h.toan)}${item("Ngữ văn",h.nguVan)}${item("Ngoại ngữ",h.ngoaiNgu)}
 ${item("Vật lí",h.vatLi)}${item("Hóa học",h.hoaHoc)}${item("Sinh học",h.sinhHoc)}
 ${item("Địa lí",h.diaLi)}${item("Lịch sử",h.lichSu)}
 </div></div>`;
}
</script>
</body>
</html>
